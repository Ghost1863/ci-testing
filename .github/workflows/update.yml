name: Verify, Build & Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/site/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: gorgo:latest
  IMAGE_ARTIFACT: gorgo-image

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    outputs:
      site: ${{ steps.f.outputs.site }}
    steps:
      - run: echo "done"

  verify:
    needs: changes
    if: |
      always() && (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && needs.changes.outputs.site == 'true')
      )
    name: verify (${{ matrix.task.name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        task:
          - { name: "biome",       cwd: ".",              cmd: "yarn biome check ." }
          - { name: "typecheck",   cwd: "packages/site",  cmd: "yarn lint" }
          - { name: "unit",        cwd: "packages/site",  cmd: "yarn test:unit" }
          - { name: "integration", cwd: "packages/site",  cmd: "yarn test:integration" }
    steps:
      - run: echo "done"

  build:
    needs: verify
    if: |
      !cancelled() &&
      needs.verify.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - run: echo "done"

  deploy:
    needs: build
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: "gorgojs.ru"
            host: "109.172.38.189"
            container: "gorgo"
            domain: "https://gorgojs.ru"
          - name: "gorgojs.com"
            host: "37.233.85.210"
            container: "gorgo-com"
            domain: "https://gorgojs.com"
    steps:
      - run: echo "done"